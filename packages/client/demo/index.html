<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>@http-query/client — Demo</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 24px; }
      .row { display:flex; gap:8px; margin-bottom:8px }
      textarea { width:100%; height:120px }
      pre { background:#111; color:#fff; padding:12px; overflow:auto }
      label { font-weight:600 }
      .card { border:1px solid #ddd; padding:12px; border-radius:8px }
    </style>
  </head>
  <body>
    <h1>@http-query/client — Demo</h1>
    <p>This demo shows how to use the new HTTP <code>QUERY</code> method with <code>@http-query/client</code>. The demo uses <code>https://httpbin.org/anything</code> which echoes the received request back.</p>

    <div class="card">
      <div class="row">
        <label for="url">URL</label>
        <input id="url" value="/anything" style="flex:1" />
      </div>

      <div class="row">
        <label for="method">Fallback</label>
        <select id="fallback">
          <option value="POST">POST</option>
          <option value="GET">GET</option>
          <option value="">None</option>
        </select>
        <label style="margin-left:12px">Timeout (ms)</label>
        <input id="timeout" value="5000" style="width:90px" />
      </div>

      <div>
        <label for="body">Body (JSON)</label>
        <textarea id="body">{ "name": "Alice", "active": true }</textarea>
      </div>

      <div style="margin-top:12px">
        <button id="send">Send QUERY</button>
      </div>
    </div>

    <h2>Response</h2>
    <pre id="out">—</pre>

    <script type="module" src="./main.mjs"></script>
  </body>
</html>
